{% extends 'base.html' %}

{% block conteudo %}
    <h2>Minhas Tarefas</h2>
    <ul>
        {% for tarefa in tarefas %}
            <li>
                <strong>{{ tarefa.titulo }}</strong> - {{ tarefa.descricao }}
                <a href="{% url 'editar_tarefa' tarefa.id %}">[Editar]</a>
                <form action="{% url 'excluir_tarefa' tarefa.id %}" method="POST" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Excluir</button>
                </form>
            </li>
        {% empty %}
            <li>Nenhuma tarefa cadastrada.</li>
        {% endfor %}
    </ul>
{% endblock %}
