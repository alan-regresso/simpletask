{% extends 'base.html' %}

{% block conteudo %}
    <h2>{% if form.instance.id %}Editar{% else %}Nova{% endif %} Tarefa</h2>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar Dados</button>
    </form>
    
    <br>
    <a href="{% url 'lista_tarefas' %}">Cancelar</a>
{% endblock %}
